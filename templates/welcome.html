<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to KhetSetu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4CAF50 0%, #81C784 50%, #A5D6A7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .welcome-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 90%;
            position: relative;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .farmer-container {
            margin-bottom: 2rem;
            position: relative;
        }

        .farmer {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            position: relative;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        .farmer-body {
            width: 80px;
            height: 120px;
            background: #8D6E63;
            border-radius: 10px;
            margin: 0 auto;
            position: relative;
        }

        .farmer-head {
            width: 60px;
            height: 60px;
            background: #FFDBCB;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            margin-bottom: 10px;
        }

        .farmer-hat {
            width: 80px;
            height: 40px;
            background: #795548;
            border-radius: 40px 40px 0 0;
            position: absolute;
            top: -20px;
            left: -10px;
        }

        .farmer-eyes {
            position: absolute;
            top: 20px;
            left: 15px;
        }

        .eye {
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            display: inline-block;
            margin-right: 15px;
            animation: blink 3s infinite;
        }

        @keyframes blink {
            0%, 95% {
                transform: scaleY(1);
            }
            97% {
                transform: scaleY(0.1);
            }
        }

        .farmer-mouth {
            width: 20px;
            height: 10px;
            border: 2px solid #333;
            border-top: none;
            border-radius: 0 0 20px 20px;
            position: absolute;
            top: 35px;
            left: 20px;
            animation: smile 2s infinite ease-in-out;
        }

        @keyframes smile {
            0%, 100% {
                width: 20px;
            }
            50% {
                width: 25px;
                left: 17px;
            }
        }

        .farmer-arms {
            position: absolute;
            top: 20px;
        }

        .arm {
            width: 30px;
            height: 8px;
            background: #FFDBCB;
            border-radius: 4px;
            position: absolute;
        }

        .left-arm {
            left: -25px;
            transform: rotate(-45deg);
            animation: wave 1.5s infinite ease-in-out;
        }

        .right-arm {
            right: -25px;
            transform: rotate(45deg);
            animation: wave 1.5s infinite ease-in-out reverse;
        }

        @keyframes wave {
            0%, 100% {
                transform: rotate(-45deg);
            }
            50% {
                transform: rotate(-20deg);
            }
        }

        .farmer-legs {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .leg {
            width: 15px;
            height: 35px;
            background: #5D4037;
            border-radius: 0 0 8px 8px;
            display: inline-block;
            margin: 0 10px;
        }

        .welcome-text {
            color: #2E7D32;
            margin-bottom: 1.5rem;
        }

        .welcome-text h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            animation: textGlow 2s infinite alternate;
        }

        @keyframes textGlow {
            from {
                text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
            }
            to {
                text-shadow: 0 0 30px rgba(76, 175, 80, 0.8);
            }
        }

        .welcome-text p {
            font-size: 1.2rem;
            color: #4CAF50;
            margin-bottom: 1rem;
        }

        .continue-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .continue-btn:hover {
            background: linear-gradient(135deg, #45a049, #4CAF50);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
        }

        .floating-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .floating-icon {
            position: absolute;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 6s infinite ease-in-out;
        }

        .floating-icon:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-icon:nth-child(2) {
            top: 20%;
            right: 15%;
            animation-delay: 1s;
        }

        .floating-icon:nth-child(3) {
            bottom: 30%;
            left: 20%;
            animation-delay: 2s;
        }

        .floating-icon:nth-child(4) {
            bottom: 20%;
            right: 10%;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            33% {
                transform: translateY(-20px) rotate(10deg);
            }
            66% {
                transform: translateY(10px) rotate(-5deg);
            }
        }

        .logo {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="floating-icons">
        <div class="floating-icon">🌱</div>
        <div class="floating-icon">🚜</div>
        <div class="floating-icon">🌾</div>
        <div class="floating-icon">🌿</div>
    </div>

    <div class="welcome-container">
        <div class="logo">KhetSetu 🌾</div>
        
        <div class="farmer-container">
            <div class="farmer">
                <div class="farmer-head">
                    <div class="farmer-hat"></div>
                    <div class="farmer-eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="farmer-mouth"></div>
                </div>
                <div class="farmer-body">
                    <div class="farmer-arms">
                        <div class="arm left-arm"></div>
                        <div class="arm right-arm"></div>
                    </div>
                </div>
                <div class="farmer-legs">
                    <div class="leg"></div>
                    <div class="leg"></div>
                </div>
            </div>
        </div>

        <div class="welcome-text">
            <h1>Namaste! 🙏</h1>
            <p>Welcome to KhetSetu, {{ username }}!</p>
            <p>Your journey towards sustainable farming begins here</p>
        </div>

        <button class="continue-btn" onclick="proceedToDashboard()">
            Continue to Dashboard →
        </button>
    </div>

    <script>
        function proceedToDashboard() {
            // Add a nice transition effect
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 500);
        }

        // Auto redirect after 5 seconds if user doesn't click
        setTimeout(() => {
            if (confirm('Ready to explore your dashboard?')) {
                proceedToDashboard();
            }
        }, 5000);
    </script>
</body>
</html>
