<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌾 Farming Champions Leaderboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: url('https://images.pexels.com/photos/257360/pexels-photo-257360.jpeg') no-repeat center bottom fixed;
      background-size: cover;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
      color: white;
    }
    /* Overlay for better readability */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }
    .container {
      position: relative; z-index: 1;
      max-width: 1000px; margin: auto; padding: 40px 20px;
      backdrop-filter: blur(5px);
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
    }
    .header {
      text-align: center; margin-bottom: 30px;
      animation: fadeInDown 1s ease-out;
    }
    .title {
      font-size: 3rem;
      background: linear-gradient(45deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
    }
    .subtitle {
      font-size: 1.2rem; opacity: 0.9;
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px; margin-bottom: 40px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px); border-radius: 15px;
      padding: 20px; text-align: center;
      transition: transform 0.3s ease, border 0.3s ease;
      border: 2px solid rgba(255,255,255,0.3);
      cursor: pointer;
    }
    .stat-card:hover {
      transform: scale(1.05);
      border-color: #ffd700;
    }
    .stat-value {
      font-size: 2.5rem; font-weight: bold; color: #ffd700;
    }
    .stat-label {
      font-size: 0.9rem; opacity: 0.9;
    }
    .leaderboard {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border-radius: 25px; padding: 30px;
      border: 2px solid rgba(255,255,255,0.3);
      animation: fadeInUp 1s ease-out;
    }
    .leaderboard-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 25px;
    }
    .leaderboard-title {
      font-size: 2rem; font-weight: bold; color: #ffd700;
    }
    .filter-buttons {
      display: flex; gap: 10px;
    }
    .filter-btn {
      padding: 8px 18px;
      background: rgba(255,215,0,0.3);
      color: white; border: none; border-radius: 20px;
      cursor: pointer; transition: all 0.3s ease;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #ffd700; color: #333;
      transform: scale(1.1);
    }
    .farmer-card {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.2);
      margin-bottom: 20px; padding: 20px;
      border-radius: 20px; border-left: 4px solid #ffd700;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      cursor: pointer; overflow: hidden;
      position: relative;
    }
    .farmer-card:hover {
      transform: translateX(10px) scale(1.02);
      background: rgba(255,255,255,0.3);
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }
    .farmer-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      margin-right: 20px;
      border: 3px solid rgba(255,255,255,0.8);
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      object-fit: cover;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }
    .farmer-card:hover .farmer-avatar {
      transform: scale(1.1) rotate(5deg);
    }
    .farmer-info {
      flex: 1; color: white;
    }
    .farmer-name {
      font-size: 1.5rem; font-weight: bold; margin-bottom: 5px;
    }
    .farmer-location {
      font-size: 0.9rem; opacity: 0.8; margin-bottom: 10px;
    }
    .score-section {
      text-align: right; min-width: 180px;
    }
    .score-value {
      font-size: 1.8rem; font-weight: bold; color: #ffd700;
      margin-bottom: 8px;
    }
    .score-bar {
      width: 100%; height: 12px;
      background: rgba(255,255,255,0.4);
      border-radius: 6px; overflow: hidden; margin-bottom: 5px;
    }
    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      border-radius: 6px;
      transition: width 1s ease;
      position: relative;
    }
    .score-fill::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      animation: shine 2s infinite;
    }
    @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }

    /* Medal styles */
    .medal {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 40px;
      height: 40px;
      z-index: 10;
    }
    .medal img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.7));
    }

    /* Modal styles */
    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
      z-index: 1000;
    }
    .modal-content {
      background: rgba(255,215,0,0.9);
      margin: 5% auto; padding: 25px; border-radius: 20px;
      width: 90%; max-width: 600px; text-align: center;
      color: #333; animation: modalAppear 0.3s ease;
    }
    .close {
      float: right; font-size: 28px; font-weight: bold; cursor: pointer;
      color: #333; transition: color 0.3s;
    }
    .close:hover { color: #fff; }
    @keyframes modalAppear { from { opacity: 0; transform: scale(0.5);} to { opacity: 1; transform: scale(1);} }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-60px);} to { opacity: 1; transform: translateY(0);} }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(60px);} to { opacity: 1; transform: translateY(0);} }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">🌾 Farming Champions</h1>
      <p class="subtitle">Celebrating Sustainable Farming with Style</p>
    </div>
    <div class="stats-grid">
      <div class="stat-card" onclick="showStatsModal('farmers')">
        <span class="stat-value" id="totalFarmers">156</span>
        <span class="stat-label">Active Farmers</span>
      </div>
      <div class="stat-card" onclick="showStatsModal('co2')">
        <span class="stat-value" id="co2Saved">2.4k</span>
        <span class="stat-label">Tons CO₂ Saved</span>
      </div>
      <div class="stat-card" onclick="showStatsModal('water')">
        <span class="stat-value" id="waterSaved">89k</span>
        <span class="stat-label">Liters Water Saved</span>
      </div>
      <div class="stat-card" onclick="showStatsModal('yield')">
        <span class="stat-value" id="yieldIncrease">+34%</span>
        <span class="stat-label">Avg Yield Increase</span>
      </div>
    </div>
    <div class="leaderboard">
      <div class="leaderboard-header">
        <h2 class="leaderboard-title">🏆 Top Champions</h2>
        <div class="filter-buttons">
          <button class="filter-btn active" onclick="filterLeaderboard('all')">All Time</button>
          <button class="filter-btn" onclick="filterLeaderboard('month')">This Month</button>
          <button class="filter-btn" onclick="filterLeaderboard('week')">This Week</button>
        </div>
      </div>
      <div id="leaderboard-content">
        <div class="loading">Loading champions... 🌾</div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const medalUrls = {
      1: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Gold_medal_icon.svg/120px-Gold_medal_icon.svg.png",
      2: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Silver_medal_icon.svg/120px-Silver_medal_icon.svg.png",
      3: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Bronze_medal_icon.svg/120px-Bronze_medal_icon.svg.png"
    };

    const farmersData = [
      { name: "Rajesh Kumar", location: "Punjab, India", score: 9850, avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150&h=150&fit=crop&crop=face", achievements: ["🌿","💧","🌱","⚡","🏆"], categories: { water:95, organic:88, yield:92, tech:85 } },
      { name: "Maria Santos", location: "São Paulo, Brazil", score: 9720, avatar: "https://images.unsplash.com/photo-1494790108755-2616c6c2012e?w=150&h=150&fit=crop&crop=face", achievements:["🌿","💧","🌱","🏆"], categories:{water:92,organic:94,yield:89,tech:88} },
      { name: "James Thompson", location: "Iowa, USA", score: 9540, avatar: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=150&h=150&fit=crop&crop=face", achievements:["🌿","💧","⚡","🏆"], categories:{water:88,organic:85,yield:96,tech:92} },
      { name: "Aisha Patel", location: "Gujarat, India", score: 9380, avatar: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150&h=150&fit=crop&crop=face", achievements:["🌿","🌱","⚡"], categories:{water:90,organic:91,yield:87,tech:89} },
      { name: "Chen Wei", location: "Sichuan, China", score: 9210, avatar: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=150&h=150&fit=crop&crop=face", achievements:["🌿","💧","🌱"], categories:{water:87,organic:89,yield:85,tech:91} }
    ];

    let currentFilter = 'all';
    const maxScore = Math.max(...farmersData.map(f => f.score));

    window.addEventListener('load', () => {
      renderLeaderboard();
    });

    function renderLeaderboard(data = farmersData) {
      const cont = document.getElementById('leaderboard-content');
      cont.innerHTML = data.map((f,i) => {
        const pct = (f.score / maxScore * 100).toFixed(1);
        const medal = i < 3 ? `<div class="medal"><img src="${medalUrls[i+1]}" alt="${i+1} place medal"></div>` : '';
        return `
          <div class="farmer-card" onclick="showModal(${i})">
            ${medal}
            <img src="${f.avatar}" alt="${f.name}" class="farmer-avatar" />
            <div class="farmer-info">
              <div class="farmer-name">${f.name}</div>
              <div class="farmer-location">${f.location}</div>
            </div>
            <div class="score-section">
              <div class="score-value">${f.score.toLocaleString()}</div>
              <div class="score-bar" aria-label="Score progress bar for ${f.name}">
                <div class="score-fill" style="width: ${pct}%;"></div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterLeaderboard(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      // Filtering logic - For demo, just use all data
      if(filter === 'all') {
        renderLeaderboard(farmersData);
      } else if(filter === 'month') {
        renderLeaderboard(farmersData.slice(0,3));
      } else if(filter === 'week') {
        renderLeaderboard(farmersData.slice(0,2));
      }
    }

    function showModal(index) {
      const farmer = farmersData[index];
      const modal = document.getElementById('modal');
      const body = document.getElementById('modal-body');
      body.innerHTML = `
        <h2>${farmer.name}</h2>
        <p><strong>Location:</strong> ${farmer.location}</p>
        <img src="${farmer.avatar}" alt="${farmer.name}" style="width:120px; border-radius:50%; margin: 10px 0;">
        <p><strong>Score:</strong> ${farmer.score.toLocaleString()}</p>
        <p><strong>Achievements:</strong> ${farmer.achievements.join(' ')}</p>
        <h3>Category Scores:</h3>
        <ul style="list-style:none; padding-left:0; text-align:left;">
          <li>Water Conservation: ${farmer.categories.water}%</li>
          <li>Organic Farming: ${farmer.categories.organic}%</li>
          <li>Yield Improvement: ${farmer.categories.yield}%</li>
          <li>Technology Use: ${farmer.categories.tech}%</li>
        </ul>
      `;
      modal.style.display = 'block';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    // Close modal on outside click
    window.onclick = function(event) {
      const modal = document.getElementById('modal');
      if (event.target === modal) {
        closeModal();
      }
    };
  </script>
</body>
</html>
