<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>KhetSetu Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="static/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* Background and body styling */
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #25632d;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.85);
            z-index: -1;
        }

        /* Profile fixed at top right corner */
        .profile-top-right {
            position: fixed;
            top: 12px;
            right: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #daf3da;
            border-radius: 26px;
            padding: 6px 16px;
            box-shadow: 0 2px 10px rgba(50,180,80,0.35);
            cursor: pointer;
            user-select: none;
            z-index: 1100;
            transition: background 0.2s ease-in-out;
            font-weight: 600;
            color: #25632d;
            text-decoration: none;
            font-size: 1em;
        }
        .profile-top-right:hover {
            background: #cbe8cb;
            box-shadow: 0 0 14px #5aaf5acc;
        }
        .profile-top-right .profile-image {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #7ac57a;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(50,180,80,0.8);
            overflow: hidden;
        }
        .profile-top-right .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .profile-top-right .profile-name {
            white-space: nowrap;
        }
        .profile-top-right i.fa-caret-down {
            color: #25632d;
            font-size: 1.2em;
        }

        /* Header bar container */
        .header-bar {
            position: sticky;
            top: 0;
            background: rgba(54, 124, 48, 0.85);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 0 15px rgba(54, 124, 48, 0.7);
            user-select: none;
            z-index: 1000;
        }

        /* Logo text top-left */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-text {
            font-weight: 900;
            color: white;
            font-size: 2.4em;
        }
        .logo-icon {
            font-size: 2.4em;
            user-select: none;
        }

        /* Dashboard centered */
        .dashboard-label {
            color: white;
            font-weight: 900;
            font-size: 2.4em;
            letter-spacing: 5px;
            user-select: none;
            text-transform: uppercase;
        }

        /* Container below header for Quiz | Leaderboard | Badges */
        .nav-buttons-row {
            margin-top: 8px;
            background: rgba(54,124,48,0.85);
            padding: 8px 32px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 12px rgba(54,124,48,0.7);
            user-select: none;
            z-index: 999;
        }
        .nav-buttons-row a.nav-btn {
            background: #daf3da;
            border-radius: 12px;
            padding: 10px 22px;
            cursor: pointer;
            color: #25632d;
            font-weight: 700;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 1.5px 6px rgba(50, 180, 80, 0.12);
            text-decoration: none;
            transition: background 0.2s ease-in-out, box-shadow 0.3s ease;
            user-select: none;
        }
        .nav-buttons-row a.nav-btn:hover {
            background: #cbe8cb;
            box-shadow: 0 0 10px #5aaf5acc;
        }
        .nav-buttons-row a.nav-btn i {
            color: #36824e;
            font-size: 1.4em;
        }

        /* Main content row: progress bar left, custom buttons right */
        main {
            flex-grow: 1;
            padding: 36px 48px 48px 48px;
            display: flex;
            justify-content: center;
            gap: 32px;
            max-width: 1200px;
            margin: 0 auto 40px auto;
            box-sizing: border-box;
        }

        .progress-section {
            flex: 1;
            min-width: 320px;
            max-width: 460px;
            background: #f8fef9;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 0 8px rgba(50,180,80,0.08);
            color: #25632d;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .progress-section h2 {
            font-size: 1.6em;
            margin-bottom: 18px;
        }
        .progress-bar-background {
            width: 100%;
            height: 14px;
            background: #daf2da;
            border-radius: 8px;
            margin-bottom: 18px;
        }
        .progress-bar-fill {
            width: 40%;
            height: 100%;
            background: #66c066;
            border-radius: 8px;
        }

        /* Custom buttons container on right of progress */
        .custom-buttons-container {
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            background: #f8fef9;
            border-radius: 20px;
            padding: 32px 26px;
            box-shadow: 0 0 8px rgba(50,180,80,0.08);
        }
        .levels-btn {
            width: 100%;
            height: 68px;
            background: #7ac57a;
            color: white;
            font-weight: 700;
            font-size: 1.5em;
            border: none;
            border-radius: 13px;
            margin-bottom: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 2px 6px rgba(50,180,80,0.11);
            transition: background 0.16s;
        }
        .levels-btn:hover {
            background: #5ab75a;
        }
        .mini-btn {
            width: 100%;
            height: 44px;
            background: #daf3da;
            color: #25632d;
            font-size: 1.1em;
            margin: 6px 0;
            border-radius: 11px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 14px;
            padding-left: 20px;
            box-shadow: 0 1.5px 6px rgba(50,180,80,0.12);
            transition: background 0.16s;
        }
        .mini-btn:hover {
            background: #cbe8cb;
        }

        /* Footer styling */
        footer {
            background: rgba(54, 130, 78, 0.85);
            color: white;
            padding: 14px 0;
            text-align: center;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -3px 15px rgba(54, 130, 78, 0.6);
            user-select: none;
            font-weight: 600;
            font-size: 1em;
            margin-top: auto;
        }

        /* Responsive */
        @media (max-width: 960px) {
            main {
                flex-direction: column;
                align-items: center;
                padding: 24px 20px 60px 20px;
            }
            .custom-buttons-container {
                width: 90vw;
                max-width: 380px;
                margin-top: 30px;
            }
            .progress-section {
                max-width: 90vw;
            }
            .nav-buttons-row {
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px;
                padding: 12px 20px;
            }
        }
        @media (max-width: 480px) {
            .nav-buttons-row a.nav-btn {
                font-size: 1em;
                padding: 8px 14px;
            }
            .levels-btn {
                font-size: 1.3em;
                height: 56px;
            }
            .mini-btn {
                font-size: 1em;
                height: 40px;
            }
        }
    </style>
</head>
<body>

    <!-- Profile fixed top right -->
    <a href="#" class="profile-top-right" title="User Profile Dropdown">
        <span class="profile-image">
            <!-- Replace with actual image if available -->
            <!-- <img src="user-avatar.jpg" alt="Profile Image" /> -->
        </span>
        <span class="profile-name">Rachit Kanchan</span>
        <i class="fa fa-caret-down"></i>
    </a>

    <!-- Header with logo, dashboard text and nav buttons -->
    <header class="header-bar" role="banner" aria-label="Main navigation header">
        <div class="logo-container" aria-label="Site logo">
            <span class="logo-text">KhelSetu</span>
            <span class="logo-icon">🌾</span>
        </div>
        <div class="dashboard-label" aria-label="Page Title">
            Dashboard
        </div>
        <div style="width:70px"><!-- empty spacer to balance flex --></div>
    </header>

    <nav class="nav-buttons-row" aria-label="Primary navigation buttons">
        <a href="/quiz" class="nav-btn">
            <i class="fa fa-question-circle"></i>
            Quiz
        </a>
        <a href="/leaderboard" class="nav-btn">
            <i class="fa fa-trophy"></i>
            Leaderboard
        </a>
        <a href="/badges" class="nav-btn">
            <i class="fa fa-award"></i>
            Badges
        </a>
    </nav>

    <main>
        <section class="progress-section" aria-label="User progress section">
            <h2>Your Progress <span>📊</span></h2>
            <p style="font-weight: 600; font-size: 1.2em;">XP Points: 40</p>
            <div class="progress-bar-background" aria-describedby="progress-desc" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="40">
                <div class="progress-bar-fill"></div>
            </div>
            <p id="progress-desc" style="text-align:right; font-size:1.8em; margin-top: 18px;">🏅</p>
        </section>

        <section class="custom-buttons-container" aria-label="Additional dashboard actions">
            <a href="/levels" class="levels-btn">
                <i class="fa fa-layer-group"></i>
                LEVELS
            </a>
            <a href="/emergency_levels" class="mini-btn">
                <i class="fa fa-exclamation-triangle" style="color:#f6b603;"></i>
                Emergency Levels
            </a>
            <a href="/marketplace" class="mini-btn">
                <i class="fa fa-store" style="color:#36824e;"></i>
                Market Place
            </a>
            <a href="/weather" class="mini-btn">
                <i class="fa fa-cloud-sun" style="color:#419cce;"></i>
                Weather
            </a>
        </section>
    </main>

    <footer>
        KhetSetu Hackathon Project — Connecting Farmers, Knowledge &amp; Sustainability
    </footer>
</body>
</html>
