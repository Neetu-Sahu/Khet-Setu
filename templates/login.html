<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhetSetu - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, rgba(34, 139, 34, 0.8), rgba(107, 142, 35, 0.8)), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><defs><pattern id="farm" patternUnits="userSpaceOnUse" width="100" height="100"><rect width="100" height="100" fill="%23228B22"/><path d="M20,80 Q30,70 40,80 Q50,70 60,80 Q70,70 80,80" stroke="%23FFD700" stroke-width="2" fill="none"/><circle cx="15" cy="85" r="3" fill="%238B4513"/><circle cx="85" cy="85" r="3" fill="%238B4513"/><path d="M25,90 L35,85 L45,90 L55,85 L65,90 L75,85" stroke="%2332CD32" stroke-width="3"/></pattern></defs><rect width="100%" height="100%" fill="url(%23farm)"/></svg>') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Animated background elements */
        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .wheat {
            position: absolute;
            color: #FFD700;
            font-size: 24px;
            animation: float 6s ease-in-out infinite;
        }

        .wheat:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .wheat:nth-child(2) { top: 20%; right: 10%; animation-delay: -2s; }
        .wheat:nth-child(3) { bottom: 20%; left: 15%; animation-delay: -4s; }
        .wheat:nth-child(4) { bottom: 30%; right: 5%; animation-delay: -6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(5deg); opacity: 1; }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 36px;
            color: #2E7D32;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo::after {
            content: "🌾";
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            color: #2E7D32;
            font-size: 14px;
            margin-top: 5px;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 15px 50px 15px 15px;
            border: 2px solid rgba(46, 125, 50, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            color: #2E7D32;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #4CAF50;
            background: rgba(255, 255, 255, 1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #4CAF50;
            font-size: 18px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #2E7D32;
            border: 2px solid #4CAF50;
        }

        .btn-secondary:hover {
            background: rgba(76, 175, 80, 0.1);
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #2E7D32;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(46, 125, 50, 0.3);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #D32F2F;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #2E7D32;
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 20px;
            }
            
            .logo {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background elements -->
    <div class="floating-elements">
        <div class="wheat">🌾</div>
        <div class="wheat">🌾</div>
        <div class="wheat">🌾</div>
        <div class="wheat">🌾</div>
    </div>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo">KhetSetu</div>
            <div class="subtitle">Connecting Farmers, Knowledge & Sustainability</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'error' if category == 'error' else 'success' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <input type="text" name="phone" class="form-control" placeholder="Your phone number" required>
                <span class="input-icon">📞</span>
            </div>

            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
                <span class="input-icon">🔒</span>
            </div>

            <button type="submit" class="btn btn-primary">
                🚀 Login to KhetSetu
            </button>
        </form>

        <div class="divider">OR</div>

        <a href="{{ url_for('signup') }}">
            <button type="button" class="btn btn-secondary">
                🌱 Create New Account
            </button>
        </a>
    </div>
</body>
</html>
